<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <style>
    :root {
      --bg-fill: #F7F6F2; /* Default Light Mode Pearl */
      --primary: #4D3FFF;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-fill: #1A1A1E; /* Dark Tab Background */
        --primary: #7B70FF; /* Electric Violet for Dark Tabs */
      }
    }
    .background { fill: var(--bg-fill); }
    .primary { fill: var(--primary); }
  </style>
  <circle cx="32" cy="40" r="28" class="primary" />
  <circle cx="52" cy="32" r="20" class="background" />
  <circle cx="52" cy="32" r="14" class="background" />
  <circle cx="52" cy="32" r="9" fill="#00C896" opacity="0.9" />
  <circle cx="32" cy="40" r="10" class="background" />
  <circle cx="52" cy="32" r="4" class="background" />
</svg>
